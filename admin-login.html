<!DOCTYPE html>
<html>
<head>

<title>Admin Login</title>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

.box{
background:white;
padding:20px;
width:300px;
border-radius:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<input id="email"
placeholder="Admin Email">

<input id="password"
type="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<script type="module">

import { auth }
from "./firebase.js";

import {
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

window.login=async()=>{

let email=
document.getElementById("email").value;

let password=
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

location.href="admin.html";

}catch{

alert("Invalid Login");

}

};

</script>

</body>
</html>
